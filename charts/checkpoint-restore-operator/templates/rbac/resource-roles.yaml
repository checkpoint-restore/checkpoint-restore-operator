apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "checkpoint-restore-operator.fullnameWithSuffix" (list . "podrestore-viewer-role") }}
  labels:
    {{- include "checkpoint-restore-operator.labels" . | nindent 4 }}
