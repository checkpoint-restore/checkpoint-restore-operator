{{- /* Keep the manager ClusterRole rules below in sync with the
controller-gen output in config/rbac/role.yaml, regenerated by
"make manifests" from the kubebuilder RBAC markers. */}}
{{- if and .Values.operator.enabled .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "checkpoint-restore-operator.managerRole.name" . }}
  labels:
    {{- include "checkpoint-restore-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: rbac
rules:
  - apiGroups:
      - ""
    resources:
      - namespaces
      - nodes
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - nodes/checkpoint
    verbs:
      - create
  - apiGroups:
      - ""
    resources:
      - nodes/proxy
    verbs:
      - create
      - get
  - apiGroups:
      - ""
    resources:
      - persistentvolumeclaims
    verbs:
      - create
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - watch
  - apiGroups:
      - ""
    resources:
      - pods/log
    verbs:
      - get
  - apiGroups:
      - criu.org
    resources:
      - checkpointrestoreoperators
      - checkpointschedules
      - forensicsnapshotchains
      - podrestores
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - criu.org
    resources:
      - checkpointrestoreoperators/finalizers
      - checkpointschedules/finalizers
      - forensicsnapshotchains/finalizers
      - podrestores/finalizers
    verbs:
      - update
  - apiGroups:
      - criu.org
    resources:
      - checkpointrestoreoperators/status
      - checkpointschedules/status
      - forensicsnapshotchains/status
      - podrestores/status
    verbs:
      - get
      - patch
      - update
  - apiGroups:
      - metrics.k8s.io
    resources:
      - pods
    verbs:
      - get
      - list
  - apiGroups:
      - snapshot.storage.k8s.io
    resources:
      - volumesnapshotclasses
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - snapshot.storage.k8s.io
    resources:
      - volumesnapshots
    verbs:
      - create
      - delete
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "checkpoint-restore-operator.managerRoleBinding.name" . }}
  labels:
    {{- include "checkpoint-restore-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "checkpoint-restore-operator.managerRole.name" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "checkpoint-restore-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "checkpoint-restore-operator.leaderElectionRole.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "checkpoint-restore-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: rbac
rules:
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "checkpoint-restore-operator.leaderElectionRoleBinding.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "checkpoint-restore-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "checkpoint-restore-operator.leaderElectionRole.name" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "checkpoint-restore-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
