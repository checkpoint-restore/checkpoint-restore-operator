apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cro.fullname" . }}-controller-manager
  namespace: {{ .Release.Namespace }}
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: checkpoint-restore-operator
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      control-plane: controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: controller-manager
    spec:
      securityContext:
        runAsNonRoot: true
      serviceAccountName: {{ include "cro.saName" . }}
      terminationGracePeriodSeconds: 10

      containers:
      {{- if .Values.metrics.enabled }}
      - name: kube-rbac-proxy
        image: {{ .Values.proxy.image }}
        args:
          - --secure-listen-address=0.0.0.0:8443
          - --upstream=http://127.0.0.1:8080/
          - --logtostderr=true
          - --v=0
        ports:
          - containerPort: 8443
            name: https
            protocol: TCP
        resources:
{{ toYaml .Values.proxy.resources | indent 10 }}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
      {{- end }}

      - name: manager
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command:
          - /manager
        args:
          - --health-probe-bind-address={{ (default ":8081" .Values.manager.healthProbeBindAddress) }}
          - --metrics-bind-address={{ (default "127.0.0.1:8080" .Values.manager.metricsBindAddress) }}

          {{- if .Values.leaderElection.enabled }}
          - --leader-elect
          {{- end }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
{{ toYaml .Values.resources | indent 10 }}
        securityContext:
          runAsNonRoot: false
          runAsUser: {{ .Values.securityContext.runAsUser }}
          allowPrivilegeEscalation: {{ .Values.securityContext.allowPrivilegeEscalation }}
          capabilities:
            drop: ["ALL"]
            add:
            {{- range .Values.securityContext.addCapabilities }}
              - {{ . | quote }}
            {{- end }}
        volumeMounts:
          - name: kubelet-checkpoints
            mountPath: /var/lib/kubelet/checkpoints

      volumes:
        - name: kubelet-checkpoints
          hostPath:
            path: {{ .Values.checkpointDir.hostPath }}
            type: Directory

