---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: forensicsnapshotchains.criu.org
spec:
  group: criu.org
  names:
    kind: ForensicSnapshotChain
    listKind: ForensicSnapshotChainList
    plural: forensicsnapshotchains
    singular: forensicsnapshotchain
  scope: Namespaced
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        description: ForensicSnapshotChain is the Schema for the forensicsnapshotchains
          API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of ForensicSnapshotChain
            properties:
              capture:
                description: capture defines snapshot collection
                properties:
                  interval:
                    description: interval is the time between snapshots
                    type: string
                    x-kubernetes-validations:
                    - message: interval must be at least 1s
                      rule: duration(self) >= duration('1s')
                  maxDuration:
                    description: maxDuration is the maximum lifetime of the snapshot
                      run
                    type: string
                    x-kubernetes-validations:
                    - message: maxDuration must be at least 1s
                      rule: duration(self) >= duration('1s')
                  maxSnapshots:
                    description: |-
                      maxSnapshots is the maximum number of capture rounds to perform before
                      completing the capture run. Each round checkpoints every selected
                      container of every matching pod once.
                    format: int32
                    minimum: 1
                    type: integer
                type: object
                x-kubernetes-validations:
                - message: at least one of maxSnapshots or maxDuration must be set
                  rule: has(self.maxSnapshots) || has(self.maxDuration)
              containerNames:
                description: containerNames restricts the snapshotting to specific
                  containers
                items:
                  type: string
                type: array
                x-kubernetes-list-type: atomic
              integrity:
                description: integrity defines integrity verification
                properties:
                  forensicSignature:
                    description: forensicSignature defines how to sign the snapshotchain
                      manifest
                    properties:
                      enabled:
                        description: |-
                          Does manifest generation & detached GPG signing at snapshotchain completion
                          Requires integrity to be enabled
                        type: boolean
                      secretKey:
                        description: |-
                          secretKey is the Secret data key for the GPG private key
                          Defaults to "signing-key"
                        type: string
                      secretRef:
                        description: |-
                          this names the Secret in operator namespace that contains the GPG private key
                          Defaults to "forensic-signing-key" when enabled and unset
                        properties:
                          name:
                            default: ""
                            description: |-
                              Name of the referent.
                              This field is effectively required, but due to backwards compatibility is
                              allowed to be empty. Instances of this type with an empty value here are
                              almost certainly wrong.
                              More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                            type: string
                        type: object
                        x-kubernetes-map-type: atomic
                    type: object
                  hashAlgorithm:
                    description: hashAlgorithm defines the hash algorithm used to
                      verify integrity
                    type: string
                type: object
              namespace:
                description: namespace is the namespace containing the selected pods
                type: string
              postSnapshotAction:
                default: None
                description: postSnapshotAction is the action to take after the snapshot
                  run completes.
                enum:
                - None
                - DeletePod
                type: string
              selector:
                description: selector identifies the target pods
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
            required:
            - capture
            - namespace
            - selector
            type: object
          status:
            description: status defines the observed state of ForensicSnapshotChain
            properties:
              attemptCount:
                description: |-
                  attemptCount is the number of capture rounds attempted so far,
                  including rounds in which no pods matched and nothing was captured.
                  It backstops termination of a maxSnapshots-only capture run whose selector
                  never matches; see the controller for details.
                format: int32
                type: integer
              completionTime:
                description: completionTime is when the resource reached a terminal
                  phase.
                format: date-time
                type: string
              conditions:
                description: conditions represent the latest observations of the snapshot
                  run state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              errorMessage:
                description: errorMessage holds the most recent capture error, if
                  any.
                type: string
              failureCount:
                description: |-
                  failureCount is the number of consecutive capture rounds that failed
                  with a checkpoint error. It resets to zero after any round that did not
                  fail. When no maxDuration is configured it backstops termination of a
                  capture run whose target cannot be checkpointed, moving it to Failed rather
                  than retrying forever.
                format: int32
                type: integer
              lastSnapshotTime:
                description: lastSnapshotTime is when the most recent capture round
                  ran.
                format: date-time
                type: string
              manifest:
                description: |-
                  manifest is the generated snapshotchain manifest yaml after completion
                  Verifiers must use exact bytes.
                type: string
              manifestSignature:
                description: manifestSignature is the detached GPG signature of the
                  manifest
                type: string
              manifestSignatureKeyID:
                description: manifestSignatureKeyID is the key ID of the GPG key used
                  to sign the manifest
                type: string
              observedGeneration:
                description: observedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
              phase:
                description: phase is the current high-level state of the snapshot
                  run.
                type: string
              snapshotChainRecords:
                description: |-
                  snapshotChainRecords is the ordered list of captured checkpoint rounds,
                  each linked to the previous by its SHA-256 hash for integrity verification.
                items:
                  description: |-
                    SnapshotChainRecord records a single captured checkpoint round in a
                    forensic snapshot chain, including its SHA-256 hash and the hash of the
                    previous record for tamper-evident chain linking.
                  properties:
                    checkpointPath:
                      description: checkpointPath is the path of the checkpoint archive
                        on the node.
                      type: string
                    containerName:
                      description: containerName is the name of the container that
                        was checkpointed.
                      type: string
                    index:
                      description: index is the position of this record within the
                        snapshot chain.
                      format: int32
                      type: integer
                    podName:
                      description: podName is the name of the pod that was checkpointed.
                      type: string
                    previousSHA256Hash:
                      description: |-
                        previousSHA256Hash is the sha256Hash of the preceding record in the
                        chain, linking records into a tamper-evident sequence.
                      type: string
                    sha256Hash:
                      description: sha256Hash is the SHA-256 checksum of the checkpoint
                        archive.
                      type: string
                    snapshotTime:
                      description: snapshotTime is when this checkpoint round was
                        captured.
                      format: date-time
                      type: string
                  required:
                  - checkpointPath
                  - containerName
                  - index
                  - podName
                  - snapshotTime
                  type: object
                type: array
                x-kubernetes-list-type: atomic
              snapshotCount:
                description: snapshotCount is the number of capture rounds completed
                  so far.
                format: int32
                type: integer
              startTime:
                description: startTime is when the resource entered the Pending phase.
                format: date-time
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
