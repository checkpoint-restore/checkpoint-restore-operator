---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: checkpointarchives.criu.org
spec:
  group: criu.org
  names:
    kind: CheckpointArchive
    listKind: CheckpointArchiveList
    plural: checkpointarchives
    singular: checkpointarchive
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.node
      name: Node
      type: string
    - jsonPath: .status.conditions[?(@.type=="Uploaded")].status
      name: Uploaded
      type: string
    - jsonPath: .status.externalURI
      name: ExternalURI
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: |-
          CheckpointArchive is the Schema for the checkpointarchives API. It records
          a single checkpoint archive that a retention policy opted into external
          storage sync, tracking where it lives locally and, once uploaded, where it
          lives in object storage.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of CheckpointArchive.
            properties:
              container:
                description: container is the name of the container the archive was
                  taken from.
                minLength: 1
                type: string
              localPath:
                description: |-
                  localPath is the absolute path of the archive on node's disk at the
                  time this object was created. It is not re-validated after creation;
                  the local garbage collector remains the sole authority on whether the
                  file still exists there.
                pattern: ^/.*\.tar$
                type: string
              namespace:
                description: namespace is the namespace of the pod the archive was
                  taken from.
                minLength: 1
                type: string
              node:
                description: node is the node the archive was created on and currently
                  lives on.
                minLength: 1
                type: string
              pod:
                description: pod is the name of the pod the archive was taken from.
                minLength: 1
                type: string
            required:
            - container
            - localPath
            - namespace
            - node
            - pod
            type: object
          status:
            description: status defines the observed state of CheckpointArchive.
            properties:
              conditions:
                description: |-
                  conditions represent the latest observations of the archive's storage
                  state. See ConditionArchiveUploaded and ConditionArchiveLocalAvailable.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              externalURI:
                description: |-
                  externalURI is the object storage location (e.g. s3://bucket/key.tar)
                  once the checkpoint-syncer has uploaded the archive. Empty until then.
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
