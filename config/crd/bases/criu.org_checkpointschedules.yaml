---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: checkpointschedules.criu.org
spec:
  group: criu.org
  names:
    kind: CheckpointSchedule
    listKind: CheckpointScheduleList
    plural: checkpointschedules
    singular: checkpointschedule
  scope: Namespaced
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        description: CheckpointSchedule is the Schema for the checkpointschedules
          API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              CheckpointScheduleSpec defines which pods to checkpoint and what should
              initiate a checkpoint.
            properties:
              containerNames:
                description: |-
                  ContainerNames restricts checkpointing to the named containers of a
                  matching pod. When empty, all containers are checkpointed.
                items:
                  type: string
                type: array
              namespace:
                description: Namespace is the namespace in which pods are selected.
                type: string
              selector:
                description: |-
                  Selector selects the pods to checkpoint by label. Only pods in the
                  Running phase are checkpointed.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              triggers:
                description: |-
                  Triggers describes what initiates a checkpoint. Multiple triggers can
                  be combined.
                properties:
                  interval:
                    description: |-
                      Interval is the time between periodic checkpoints of the matching
                      pods, expressed as a duration string (e.g. "30s", "15m", "12h"). The
                      first checkpoint is taken one interval after the CheckpointSchedule
                      is created.
                    type: string
                    x-kubernetes-validations:
                    - message: interval must be at least 1s
                      rule: duration(self) >= duration('1s')
                  onAnnotation:
                    description: |-
                      OnAnnotation enables on-demand checkpoints: annotating a matching pod
                      with checkpoint.criu.org/trigger=true checkpoints it once and removes
                      the annotation.
                    type: boolean
                  onKubernetesEvents:
                    description: |-
                      OnKubernetesEvents lists pod disruption signals that trigger a
                      checkpoint: NodeDrain (the pod's node is marked unschedulable),
                      PodEviction (the pod is being deleted) or Preemption (the pod has the
                      DisruptionTarget condition, Kubernetes 1.26+).
                    items:
                      type: string
                    type: array
                  resourceThreshold:
                    description: |-
                      ResourceThreshold checkpoints a container when its CPU or memory usage
                      crosses a configured percentage of its resource limit. Requires the
                      Kubernetes Metrics API (metrics-server).
                    properties:
                      cpuPercent:
                        description: CPUPercent defines CPU usage bounds relative
                          to the container's limit.
                        properties:
                          lower:
                            description: |-
                              Lower triggers a checkpoint when usage drops below this percentage of
                              the container's limit.
                            type: integer
                          upper:
                            description: |-
                              Upper triggers a checkpoint when usage exceeds this percentage of the
                              container's limit.
                            type: integer
                        type: object
                      memoryPercent:
                        description: |-
                          MemoryPercent defines memory usage bounds relative to the container's
                          limit.
                        properties:
                          lower:
                            description: |-
                              Lower triggers a checkpoint when usage drops below this percentage of
                              the container's limit.
                            type: integer
                          upper:
                            description: |-
                              Upper triggers a checkpoint when usage exceeds this percentage of the
                              container's limit.
                            type: integer
                        type: object
                      pollIntervalSeconds:
                        description: |-
                          PollIntervalSeconds is the number of seconds between metrics polls.
                          Defaults to 30.
                        type: integer
                    type: object
                type: object
            required:
            - namespace
            - selector
            - triggers
            type: object
          status:
            description: CheckpointScheduleStatus defines the observed state of CheckpointSchedule
            properties:
              checkpointsCreated:
                description: |-
                  CheckpointsCreated is the number of checkpoints created by the
                  interval trigger.
                type: integer
              conditions:
                description: |-
                  Conditions represent the latest available observations of the
                  schedule's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              lastCheckpointTime:
                description: |-
                  LastCheckpointTime is when the interval trigger last checkpointed the
                  matching pods.
                format: date-time
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
