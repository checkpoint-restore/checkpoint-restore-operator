# This rule is not used by the project checkpoint-restore-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over criu.org.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: checkpoint-restore-operator
    app.kubernetes.io/managed-by: kustomize
  name: forensicsnapshotchain-admin-role
rules:
- apiGroups:
  - criu.org
  resources:
  - forensicsnapshotchains
  verbs:
  - '*'
- apiGroups:
  - criu.org
  resources:
  - forensicsnapshotchains/status
  verbs:
  - get
