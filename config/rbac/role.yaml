---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - namespaces
  - nodes
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - nodes/proxy
  verbs:
  - create
  - get
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - watch
- apiGroups:
  - criu.org
  resources:
  - checkpointrestoreoperators
  - checkpointschedules
  - forensicsnapshotchains
  - podrestores
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - criu.org
  resources:
  - checkpointrestoreoperators/finalizers
  - checkpointschedules/finalizers
  - forensicsnapshotchains/finalizers
  - podrestores/finalizers
  verbs:
  - update
- apiGroups:
  - criu.org
  resources:
  - checkpointrestoreoperators/status
  - checkpointschedules/status
  - forensicsnapshotchains/status
  - podrestores/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - metrics.k8s.io
  resources:
  - pods
  verbs:
  - get
  - list
