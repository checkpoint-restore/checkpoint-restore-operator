# This rule is not used by the project checkpoint-restore-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to criu.org resources.
# This role is intended for users who need visibility into these resources
# without the ability to modify them.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: checkpoint-restore-operator
    app.kubernetes.io/managed-by: kustomize
  name: podrestore-viewer-role
rules:
- apiGroups:
  - criu.org
  resources:
  - podrestores
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - criu.org
  resources:
  - podrestores/status
  verbs:
  - get
