# This rule is not used by the project checkpoint-restore-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the criu.org.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: checkpoint-restore-operator
    app.kubernetes.io/managed-by: kustomize
  name: podrestore-editor-role
rules:
- apiGroups:
  - criu.org
  resources:
  - podrestores
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - criu.org
  resources:
  - podrestores/status
  verbs:
  - get
