apiVersion: criu.org/v1
kind: ForensicSnapshotChain
metadata:
  name: forensicsnapshotchain-sample
spec:
  namespace: default

  selector:
    matchLabels:
      app: nginx

  capture:
    interval: 5s
    maxSnapshots: 3
    maxDuration: 1m
  
  postSnapshotAction: None

  integrity:
    hashAlgorithm: sha256

