apiVersion: criu.org/v1
kind: ForensicSnapshotChain
metadata:
  name: integrity-test
spec:
  namespace: default
  selector:
    matchLabels:
      app: nginx
  containerNames:
    - nginx
  capture:
    interval: 5s
    maxSnapshots: 3
    maxDuration: 1m
  integrity:
    hashAlgorithm: sha256
  postSnapshotAction: None