apiVersion: criu.org/v1
kind: ForensicSnapshotChain
metadata:
  name: signature-test
spec:
  namespace: default
  selector:
    matchLabels:
      app: nginx
  containerNames:
    - nginx
  capture:
    interval: 5s
    maxSnapshots: 1
    maxDuration: 2m
  integrity:
    hashAlgorithm: sha256
    forensicSignature:
      enabled: true
  postSnapshotAction: None