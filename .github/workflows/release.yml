name: release

on:
  push:
    branches: [main]
    paths:
      - VERSION

permissions:
  contents: read

env:
  HELM_KUBE_VERSION: "1.30.0"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    if: ${{ github.repository == 'checkpoint-restore/checkpoint-restore-operator' }}
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.version.outputs.release }}
      version: ${{ steps.version.outputs.version }}
      image_tag: ${{ steps.version.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Extract release version
        id: version
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"

          # The VERSION file is the single source of truth for release
          # versions. Keep this strict so chart version, appVersion, and
          # image tags cannot drift during a release.
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::VERSION must contain a version of the form X.Y.Z."
            exit 1
          fi

          # 0.0.0 is the development placeholder and is never released.
          if [[ "${VERSION}" == "0.0.0" ]]; then
            echo "VERSION is the 0.0.0 placeholder; not releasing."
            echo "release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Skip versions that already have a release, so that reverting
          # a version bump does not publish anything. git ls-remote exits
          # with 2 when the tag does not exist; treat any other failure
          # as an error rather than releasing on top of it.
          rc=0
          git ls-remote --exit-code origin "refs/tags/v${VERSION}" >/dev/null || rc=$?
          if [[ "${rc}" -eq 0 ]]; then
            echo "v${VERSION} is already released; not releasing."
            echo "release=false" >> "$GITHUB_OUTPUT"
            exit 0
          elif [[ "${rc}" -ne 2 ]]; then
            echo "::error::Failed to check whether v${VERSION} exists."
            exit "${rc}"
          fi

          echo "release=true" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "image_tag=v${VERSION}" >> "$GITHUB_OUTPUT"

  images:
    if: ${{ needs.validate.outputs.release == 'true' }}
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: manager
            dockerfile: Dockerfile
            dockerhub_repository: criu/checkpoint-restore-operator
            quay_repository: quay.io/criu/checkpoint-restore-operator
          - name: cri-proxy
            dockerfile: Dockerfile.cri-proxy
            dockerhub_repository: criu/checkpoint-restore-operator-cri-proxy
            quay_repository: quay.io/criu/checkpoint-restore-operator-cri-proxy
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to Quay.io
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_ROBOT_TOKEN }}

      - name: Build and push ${{ matrix.name }} release image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          tags: |
            ${{ matrix.dockerhub_repository }}:${{ needs.validate.outputs.image_tag }}
            ${{ matrix.quay_repository }}:${{ needs.validate.outputs.image_tag }}

  helm:
    needs: [validate, images]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4

      # The chart in the repository carries the 0.0.0 placeholder
      # appVersion and fails to render without a tag by design, so pass
      # the release image tag explicitly here. The packaged chart below
      # renders without overrides, validating the derived tags.
      - name: Lint chart
        run: |
          helm lint charts/checkpoint-restore-operator \
            --set image.tag="${{ needs.validate.outputs.image_tag }}"

      - name: Render default chart
        run: |
          helm template checkpoint-restore-operator charts/checkpoint-restore-operator \
            --namespace checkpoint-restore-operator \
            --kube-version "${HELM_KUBE_VERSION}" \
            --include-crds \
            --set image.tag="${{ needs.validate.outputs.image_tag }}"

      - name: Render chart with CRI proxy
        run: |
          helm template checkpoint-restore-operator charts/checkpoint-restore-operator \
            --namespace checkpoint-restore-operator \
            --kube-version "${HELM_KUBE_VERSION}" \
            --include-crds \
            --set image.tag="${{ needs.validate.outputs.image_tag }}" \
            --set criProxy.enabled=true \
            --set criProxy.image.tag="${{ needs.validate.outputs.image_tag }}"

      - name: Package Helm chart
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          mkdir -p .chart-package
          helm package charts/checkpoint-restore-operator \
            --version "${VERSION}" \
            --app-version "${VERSION}" \
            --destination .chart-package

      - name: Render release package
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          helm template checkpoint-restore-operator ".chart-package/checkpoint-restore-operator-${VERSION}.tgz" \
            --namespace checkpoint-restore-operator \
            --kube-version "${HELM_KUBE_VERSION}" \
            --include-crds \
            --set criProxy.enabled=true

      - name: Upload packaged chart
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: .chart-package/checkpoint-restore-operator-${{ needs.validate.outputs.version }}.tgz
          if-no-files-found: error

      # Pass the secrets through the environment rather than expanding
      # them into the script text, where special characters would break
      # or inject into the shell.
      - name: Login to Quay.io OCI registry
        env:
          QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
          QUAY_ROBOT_TOKEN: ${{ secrets.QUAY_ROBOT_TOKEN }}
        run: printf '%s' "${QUAY_ROBOT_TOKEN}" | helm registry login quay.io -u "${QUAY_USERNAME}" --password-stdin

      - name: Push Helm chart
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          helm push ".chart-package/checkpoint-restore-operator-${VERSION}.tgz" oci://quay.io/criu/charts

  github-release:
    needs: [validate, images, helm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download packaged chart
        uses: actions/download-artifact@v4
        with:
          name: helm-chart
          path: .chart-package

      # Creating the release also creates the vX.Y.Z tag, pointing at
      # the merge commit that changed the VERSION file.
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          gh release create "v${VERSION}" \
            ".chart-package/checkpoint-restore-operator-${VERSION}.tgz" \
            --title "v${VERSION}" \
            --target "${GITHUB_SHA}" \
            --generate-notes
