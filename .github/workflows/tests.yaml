name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Install envtest binaries
        run: |
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@release-0.18
          echo "KUBEBUILDER_ASSETS=$(setup-envtest use 1.27.1 -p path)" >> "$GITHUB_ENV"

      - name: Run unit tests
        run: go test -race -coverprofile=cover.out ./...

  build-cri-proxy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Build cri-proxy binary
        run: make build-cri-proxy

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build cri-proxy image
        run: make docker-build-cri-proxy CRI_PROXY_IMG=cri-proxy:ci

  build-and-deploy:
    name: build-and-deploy (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Two dimensions: container runtime and Kubernetes version.
        # containerd runs in kind with pinned node images, covering
        # every Kubernetes version shipped with the current kind
        # release. CRI-O is not supported by kind, so those lanes run
        # a single-node kubeadm cluster directly on the runner, using
        # pkgs.k8s.io for Kubernetes and the upstream CRI-O package
        # repositories, covering every version from the oldest supported
        # by the Helm chart to the newest release.
        # Update the pinned versions when a new kind release or
        # Kubernetes minor comes out.
        include:
          - name: containerd-k8s-1.33
            provider: kind
            kind_node_image: kindest/node:v1.33.12@sha256:3f5c8443c620245e4d355cfe09e96a91ead32ceaa569d3f1ca9edf0cb2fe2ff4
          - name: containerd-k8s-1.34
            provider: kind
            kind_node_image: kindest/node:v1.34.8@sha256:02722c2dedddcfc00febf5d27fbeb9b7b2c14294c82109ff4a85d89ac9ba3256
          - name: containerd-k8s-1.35
            provider: kind
            kind_node_image: kindest/node:v1.35.5@sha256:ce977ae6d65918d0b58a5f8b5e940429c2ce42fa3a5619ec2bbc60b949c0ac95
          - name: containerd-k8s-1.36
            provider: kind
            kind_node_image: kindest/node:v1.36.1@sha256:3489c7674813ba5d8b1a9977baea8a6e553784dab7b84759d1014dbd78f7ebd5
          - name: crio-k8s-1.30
            provider: kubeadm-crio
            k8s_stream: v1.30
          - name: crio-k8s-1.31
            provider: kubeadm-crio
            k8s_stream: v1.31
          - name: crio-k8s-1.32
            provider: kubeadm-crio
            k8s_stream: v1.32
          - name: crio-k8s-1.33
            provider: kubeadm-crio
            k8s_stream: v1.33
          - name: crio-k8s-1.34
            provider: kubeadm-crio
            k8s_stream: v1.34
          - name: crio-k8s-1.35
            provider: kubeadm-crio
            k8s_stream: v1.35
          - name: crio-k8s-1.36
            provider: kubeadm-crio
            k8s_stream: v1.36
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    env:
      CHECKPOINT_DIR: /var/lib/kubelet/checkpoints
      REGISTRY_PORT: 5000
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: network=host

      - name: Install bats
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Install kind and kubectl
        if: matrix.provider == 'kind'
        env:
          # Keep in sync with the pinned node images in the matrix.
          # Downloading a pinned release directly also avoids the
          # unauthenticated GitHub API, which gets rate limited when
          # all matrix lanes query it at the same time.
          KIND_VERSION: v0.32.0
        run: |
          # Install kind
          curl -fsSLo kind --retry 5 --retry-all-errors \
            "https://github.com/kubernetes-sigs/kind/releases/download/${KIND_VERSION}/kind-linux-amd64"
          chmod +x kind
          sudo mv kind /bin/

          # Install kubectl
          curl -fsSLO --retry 5 --retry-all-errors \
            "https://dl.k8s.io/release/$(curl -fsSL --retry 5 --retry-all-errors https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /bin/

      - name: Prepare Checkpoints Directory in Host
        run: |
          sudo mkdir -p ${{ env.CHECKPOINT_DIR }}
          sudo chmod 700 ${{ env.CHECKPOINT_DIR }}

      - name: Generate Checkpoint Tar Files
        run: ./test/generate_checkpoint_tar.sh

      - name: Create Kubernetes cluster (kind, containerd)
        if: matrix.provider == 'kind'
        run: |
          kind create cluster --config=./test/kind-config.yaml --image=${{ matrix.kind_node_image }}
          kind export kubeconfig

      - name: Create Kubernetes cluster (kubeadm, CRI-O)
        if: matrix.provider == 'kubeadm-crio'
        run: ./test/setup_kubeadm_crio.sh ${{ matrix.k8s_stream }}

      - name: Install metrics-server
        run: |
          kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
          kubectl patch -n kube-system deployment metrics-server --type=json \
            -p '[{"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--kubelet-insecure-tls"}]'
          kubectl rollout status -n kube-system deployment/metrics-server --timeout=180s

      - name: Connect the registry to the Kind network
        if: matrix.provider == 'kind'
        id: connect-registry
        run: |
          REGISTRY_ID=$(docker ps -qf "ancestor=registry:2")
          REGISTRY_NAME=$(docker inspect -f '{{.Name}}' $REGISTRY_ID | sed 's/\///')
          echo "REGISTRY_NAME=$REGISTRY_NAME" >> $GITHUB_ENV
          ./test/configure_local_registry.sh
        env:
          REGISTRY_PORT: ${{ env.REGISTRY_PORT }}
          REGISTRY_NAME: ${{ env.REGISTRY_NAME }}

      - name: Build and push to local registry
        uses: docker/build-push-action@v7
        with:
          push: true
          provenance: false
          tags: localhost:5000/checkpoint-restore-operator:ci

      - name: Deploy to Kubernetes
        run: |
          make install
          make deploy IMG=localhost:5000/checkpoint-restore-operator:ci

      - name: Wait for deployments to be ready
        run: ./test/wait_for_deployment.sh checkpoint-restore-operator-controller-manager

      - name: Check resources
        run: kubectl get all -n checkpoint-restore-operator

      - name: Test Garbage Collection
        run: sudo -E bats -f "test_garbage_collection" ./test/run_tests.bats

      - name: Test Max Checkpoints Set to 0
        run: sudo -E bats -f "test_max_checkpoints_set_to_0" ./test/run_tests.bats

      - name: Test Max Checkpoints Set to 1
        run: sudo -E bats -f "test_max_checkpoints_set_to_1" ./test/run_tests.bats

      - name: Test Max Total Checkpoint Size
        run: sudo -E bats -f "test_max_total_checkpoint_size" ./test/run_tests.bats

      - name: Test Max Checkpoint Size
        run: sudo -E bats -f "test_max_checkpoint_size" ./test/run_tests.bats

      - name: Test orphan retention
        run: sudo -E bats -f "test_orphan_retention_policy" ./test/run_tests.bats

      - name: Test CheckpointSchedule validation
        run: sudo -E bats -f "test_checkpointschedule_validation" ./test/run_tests.bats

      - name: Test CheckpointSchedule interval trigger
        run: sudo -E bats -f "test_checkpointschedule_interval_status" ./test/run_tests.bats

      - name: Test CheckpointSchedule annotation trigger
        run: sudo -E bats -f "test_checkpointschedule_annotation" ./test/run_tests.bats

      - name: Test CheckpointSchedule deletion
        run: sudo -E bats -f "test_checkpointschedule_deletion" ./test/run_tests.bats

      - name: Test CheckpointSchedule resource trigger
        run: sudo -E bats -f "test_checkpointschedule_resource_trigger" ./test/run_tests.bats

      - name: Test CheckpointSchedule event trigger
        run: sudo -E bats -f "test_checkpointschedule_event_trigger" ./test/run_tests.bats
