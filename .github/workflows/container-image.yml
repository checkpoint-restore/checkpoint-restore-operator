name: container-image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

  schedule:
    # Ideally, we would update the image every time the base image
    # is updated, but this is good enough.
    # "At minute 15 past every 4th hour from midnight through 23."
    - cron: "15 0-23/4 * * *"

permissions:
  contents: read
  pull-requests: read

# Cancel any preceding run on the pull request.
concurrency:
  group: container-image-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  changes:
    name: Detect workflow inputs
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.schedule.outputs.images == 'true' || steps.filter.outputs.images == 'true' }}
      registry_access: >-
        ${{
          steps.schedule.outputs.images == 'true' ||
          steps.filter.outputs.images == 'true' ||
          steps.filter.outputs.release == 'true'
        }}
    steps:
      - name: Always build scheduled images
        if: github.event_name == 'schedule'
        id: schedule
        run: echo "images=true" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        if: github.event_name != 'schedule'
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v4
        if: github.event_name != 'schedule'
        id: filter
        with:
          base: "main"
          filters: |
            images:
              - '.github/scripts/verify-push-access.sh'
              - '.github/workflows/container-image.yml'
              - '.dockerignore'
              - 'api/**'
              - 'cmd/**'
              - 'internal/**'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
              - 'Dockerfile'
              - 'Dockerfile.cri-proxy'
              - 'vendor/**'
            release:
              - 'VERSION'

  # Request push-scoped registry tokens and check that the granted
  # access includes push; nothing is pushed by this check. On push and
  # schedule events this gates the image push below. On VERSION-only
  # release pull requests it checks release credentials without
  # triggering a latest image build. Pull requests from forks and from
  # Dependabot run without the repository secrets and skip this check.
  verify-registry-access:
    name: Verify registry push access
    needs: changes
    if: >-
      github.repository == 'checkpoint-restore/checkpoint-restore-operator' &&
      (github.event_name == 'schedule' || needs.changes.outputs.registry_access == 'true') &&
      (github.event_name != 'pull_request' ||
       (github.event.pull_request.head.repo.full_name == github.repository &&
        github.actor != 'dependabot[bot]'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify Docker Hub push access
        env:
          REGISTRY_USER: ${{ secrets.DOCKER_USERNAME }}
          REGISTRY_PASS: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          .github/scripts/verify-push-access.sh \
            https://auth.docker.io/token registry.docker.io \
            criu/checkpoint-restore-operator \
            criu/checkpoint-restore-operator-cri-proxy

      - name: Verify Quay.io push access
        env:
          REGISTRY_USER: ${{ secrets.QUAY_USERNAME }}
          REGISTRY_PASS: ${{ secrets.QUAY_ROBOT_TOKEN }}
        run: |
          .github/scripts/verify-push-access.sh \
            https://quay.io/v2/auth quay.io \
            criu/checkpoint-restore-operator \
            criu/checkpoint-restore-operator-cri-proxy \
            criu/charts/checkpoint-restore-operator

  # Build runs when the access check succeeded, or when it was skipped
  # (fork and Dependabot pull requests, which build without pushing),
  # but never when it failed.
  build:
    name: Build ${{ matrix.name }} image
    needs: [changes, verify-registry-access]
    if: >-
      always() &&
      !cancelled() &&
      github.repository == 'checkpoint-restore/checkpoint-restore-operator' &&
      (github.event_name == 'schedule' || needs.changes.outputs.images == 'true') &&
      contains(fromJSON('["success", "skipped"]'), needs.verify-registry-access.result)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: manager
            dockerfile: Dockerfile
            tags: |
              criu/checkpoint-restore-operator:latest
              quay.io/criu/checkpoint-restore-operator:latest
          - name: cri-proxy
            dockerfile: Dockerfile.cri-proxy
            tags: |
              criu/checkpoint-restore-operator-cri-proxy:latest
              quay.io/criu/checkpoint-restore-operator-cri-proxy:latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to Quay.io
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_ROBOT_TOKEN }}

      - name: Build and push ${{ matrix.name }} image to Docker registry
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          tags: ${{ matrix.tags }}
