name: verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any preceding run on the pull request.
concurrency:
  group: verify-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    name: Lint Go and shell code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Install ShellCheck and shfmt
        run: |
          sudo apt update
          sudo apt install -y shellcheck shfmt

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          only-new-issues: true
          args: --timeout=5m
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: codespell
        uses: codespell-project/actions-codespell@v2
        with:
          skip: vendor,*.svg
          ignore_words_list: notin

      - name: ShellCheck and shfmt
        run: |
          shellcheck ./test/*.sh
          shfmt -d ./test/*.sh

  kube-api-linter:
    name: Lint Kubernetes API types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      # kube-api-linter is a golangci-lint module, so it only exists inside a
      # custom golangci-lint binary. Install that binary directly with
      # `go install` (pinned to a pseudo-version, since the project has no
      # tagged releases yet). Bump the version from
      # https://pkg.go.dev/sigs.k8s.io/kube-api-linter?tab=versions
      - name: Install kube-api-linter
        run: go install sigs.k8s.io/kube-api-linter/cmd/golangci-lint-kube-api-linter@v0.0.0-20260518104151-5ebe05f9440b

      - name: Lint API types
        run: golangci-lint-kube-api-linter run -c .golangci-kube-api-linter.yml ./api/...

  gomod:
    name: Verify go.mod and vendor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: verify go.mod/go.sum
        run: |
          make vendor
          git diff --exit-code

  lint_markdown:
    name: Lint markdown
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: changes
        with:
          base: "main"
          filters: |
            md:
              - 'README.md'
              - '.github/workflows/verify.yml'

      - name: Lint markdown
        if: steps.changes.outputs.md == 'true'
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            README.md
